<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工具导航 - 专业的AI资源导航平台</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #50e3c2;
            --text-color: #333;
            --light-bg: #f8f9fa;
            --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-color);
            line-height: 1.6;
            background-color: var(--light-bg);
        }

        /* 顶部导航栏 */
        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: var(--card-shadow);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
        }

        /* 搜索框 */
        .search-box {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            outline: none;
        }

        /* 主要内容区域 */
        .main-content {
            margin-top: 80px;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 分类导航 */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .category-btn {
            padding: 0.5rem 1rem;
            background-color: white;
            border: 1px solid var(--primary-color);
            border-radius: 20px;
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover,
        .category-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* 工具卡片网格 */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        .tool-card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .tool-card:hover {
            transform: translateY(-5px);
        }

        .tool-icon {
            width: 50px;
            height: 50px;
            margin-bottom: 1rem;
        }

        .tool-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .tool-description {
            color: #666;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .tool-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            background-color: var(--light-bg);
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #666;
        }

        .tool-stats {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #888;
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }

            .search-box {
                width: 100%;
            }

            .main-content {
                margin-top: 120px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <a href="#" class="brand">AI工具导航</a>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="搜索AI工具..." id="searchInput">
            </div>
        </nav>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="categories" id="categories">
                <button class="category-btn active">全部</button>
                <button class="category-btn">AI绘画</button>
                <button class="category-btn">AI写作</button>
                <button class="category-btn">AI编程</button>
                <button class="category-btn">音视频处理</button>
                <button class="category-btn">办公效率</button>
                <button class="category-btn">教育工具</button>
                <button class="category-btn">对话机器人</button>
                <button class="category-btn">开发框架</button>
            </div>

            <div class="tools-grid" id="toolsGrid">
                <!-- 示例工具卡片 -->
                <div class="tool-card">
                    <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%234a90e2'/><text x='50' y='50' font-family='Arial' font-size='40' fill='white' text-anchor='middle' dy='.3em'>AI</text></svg>" alt="工具图标" class="tool-icon">
                    <h3 class="tool-name">ChatGPT</h3>
                    <p class="tool-description">强大的AI对话助手，支持多种语言的自然对话。</p>
                    <div class="tool-tags">
                        <span class="tag">对话</span>
                        <span class="tag">AI助手</span>
                        <span class="tag">自然语言</span>
                    </div>
                    <div class="tool-stats">
                        <span>热度: 9.8</span>
                        <span>❤️ 收藏</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 工具数据
        const toolsData = [
            {
                name: "ChatGPT",
                description: "强大的AI对话助手，支持多种语言的自然对话",
                tags: ["对话", "AI助手", "自然语言"],
                category: "对话机器人",
                url: "https://chat.openai.com",
                heat: 9.8
            },
            {
                name: "Midjourney",
                description: "顶级AI绘画工具，可生成高质量艺术作品",
                tags: ["AI绘画", "艺术创作", "图像生成"],
                category: "AI绘画",
                url: "https://www.midjourney.com",
                heat: 9.7
            },
            {
                name: "Stable Diffusion",
                description: "开源的AI图像生成模型，支持多种风格创作",
                tags: ["AI绘画", "开源", "图像生成"],
                category: "AI绘画",
                url: "https://stability.ai",
                heat: 9.5
            },
            {
                name: "GitHub Copilot",
                description: "AI驱动的代码智能助手，提供实时代码建议",
                tags: ["AI编程", "代码助手", "开发工具"],
                category: "AI编程",
                url: "https://github.com/features/copilot",
                heat: 9.6
            },
            {
                name: "Jasper",
                description: "专业的AI写作助手，支持多种文案类型生成",
                tags: ["AI写作", "内容创作", "营销"],
                category: "AI写作",
                url: "https://www.jasper.ai",
                heat: 9.3
            },
            {
                name: "Runway",
                description: "专业的AI视频编辑工具，支持多种特效处理",
                tags: ["视频编辑", "AI特效", "创意工具"],
                category: "音视频处理",
                url: "https://runway.ml",
                heat: 9.4
            },
            {
                name: "Notion AI",
                description: "智能办公助手，提供写作、总结、翻译等功能",
                tags: ["办公效率", "笔记", "协作"],
                category: "办公效率",
                url: "https://www.notion.so",
                heat: 9.2
            },
            {
                name: "Duolingo AI",
                description: "AI驱动的语言学习平台，提供个性化学习体验",
                tags: ["教育", "语言学习", "AI辅导"],
                category: "教育工具",
                url: "https://www.duolingo.com",
                heat: 9.0
            },
            {
                name: "TensorFlow",
                description: "谷歌开源的机器学习框架，适用于AI开发",
                tags: ["深度学习", "机器学习", "开发框架"],
                category: "开发框架",
                url: "https://www.tensorflow.org",
                heat: 9.5
            }
        ];

        // DOM元素
        const searchInput = document.getElementById('searchInput');
        const toolsGrid = document.getElementById('toolsGrid');
        const categoryButtons = document.querySelectorAll('.category-btn');

        // 搜索功能
        searchInput.addEventListener('input', filterTools);

        // 分类切换
        categoryButtons.forEach(button => {
            button.addEventListener('click', () => {
                categoryButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                filterTools();
            });
        });

        // 工具过滤函数
        function filterTools() {
            const searchTerm = searchInput.value.toLowerCase();
            const activeCategory = document.querySelector('.category-btn.active').textContent;

            const filteredTools = toolsData.filter(tool => {
                const matchesSearch = 
                    tool.name.toLowerCase().includes(searchTerm) ||
                    tool.description.toLowerCase().includes(searchTerm) ||
                    tool.tags.some(tag => tag.toLowerCase().includes(searchTerm));
                
                const matchesCategory = 
                    activeCategory === '全部' || tool.category === activeCategory;

                return matchesSearch && matchesCategory;
            });

            renderTools(filteredTools);
        }

        // 渲染工具卡片
        function renderTools(tools) {
            toolsGrid.innerHTML = tools.map(tool => `
                <a href="${tool.url}" target="_blank" class="tool-card" style="text-decoration: none; color: inherit;">
                    <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%234a90e2'/><text x='50' y='50' font-family='Arial' font-size='40' fill='white' text-anchor='middle' dy='.3em'>AI</text></svg>" alt="${tool.name}" class="tool-icon">
                    <h3 class="tool-name">${tool.name}</h3>
                    <p class="tool-description">${tool.description}</p>
                    <div class="tool-tags">
                        ${tool.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div class="tool-stats">
                        <span>热度: ${tool.heat}</span>
                        <span>🔗 访问官网</span>
                    </div>
                </a>
            `).join('');
        }

        // 初始化显示
        renderTools(toolsData);
    </script>
</body>
</html>
