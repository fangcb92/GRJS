<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冯子豪你在做什么？</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-color: #f5f5f5;
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .name {
            font-size: 3rem;
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 2s ease-in;
        }
        .section {
            margin-bottom: 30px;
            animation: slideIn 1s ease-out;
        }
        .section h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .section p {
            line-height: 1.6;
            color: #555;
        }
        .quote {
            font-style: italic;
            color: #666;
            border-left: 4px solid #3498db;
            padding-left: 20px;
            margin: 20px 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .search-box {
            margin-bottom: 20px;
            text-align: center;
        }
        .search-box input {
            padding: 10px;
            width: 300px;
            border: 2px solid #3498db;
            border-radius: 5px;
            font-size: 16px;
        }
        .name {
            cursor: pointer;
            text-decoration: underline;
            color: #3498db;
        }
        .name:hover {
            color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-box">
            <input type="text" placeholder="搜索冯子豪的踪迹..." id="searchInput">
        </div>
        
        <div class="name" onclick="showSurprise()">冯子豪你在做什么？</div>
        
        <div class="section">
            <h2>个人简介</h2>
            <p>冯子豪，一个充满神秘色彩的人物。据说他经常出没于各种意想不到的地方，让人捉摸不透。</p>
        </div>

        <div class="section">
            <h2>日常生活</h2>
            <p>平日里，他似乎总是在进行一些不为人知的活动。没人知道他到底在做什么，这也成为了一个永恒的谜题。</p>
            <div class="quote">
                "你永远不知道下一秒的冯子豪在做什么..."
            </div>
        </div>

        <div class="section">
            <h2>趣闻轶事</h2>
            <p>有传言说，冯子豪有时会突然出现在意想不到的地方，然后又神秘消失。这种行为模式让人既困惑又好奇。</p>
        </div>

        <div class="section">
            <h2>未解之谜</h2>
            <p>至今为止，仍然没有人能够准确回答"冯子豪你在做什么？"这个问题。这个谜题可能会永远保持它的神秘感。</p>
        </div>
    </div>

    <script>
        function showSurprise() {
            window.location.href = 'surprise.html';
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchText = e.target.value.toLowerCase();
            const sections = document.querySelectorAll('.section');
            
            sections.forEach(section => {
                const content = section.textContent.toLowerCase();
                section.style.display = content.includes(searchText) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
